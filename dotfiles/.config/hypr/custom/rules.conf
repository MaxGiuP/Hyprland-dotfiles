# QSUpdate (kitty)
windowrule = match:class ^(kitty)$, match:title ^(QSUpdate)$, float on, size 1000 750, center on
#windowrule = match:class ^(kitty)$, opacity 0.96

# Thunderbird calendar/reminder popups
windowrule = match:class ^(thunderbird|Thunderbird)$, match:title ^(.*(Reminder|Promemoria|Calendar|Event).*)$, float on, center on

# KDE portal dialog
windowrule = match:class ^(org\.freedesktop\.impl\.portal\.desktop\.kde)$, float on, size 1000 725, center on

# Thunderbird: compose/event editor windows should open as floating dialogs
windowrule = match:class ^(thunderbird|Thunderbird)$, match:title ^((Write|Compose|Scrivi|Nuovo messaggio|New Message|Message Compose|Event|New Event|Edit Event|Nuovo evento|Modifica evento).*)$, float on, center on, size 1280 860

# Nautilus/Files: keep fully opaque and disable blur bleed-through
windowrule = match:class ^(org\.gnome\.Nautilus|nautilus|Nautilus)$, opacity 1
windowrule = match:class ^(org\.gnome\.Nautilus|nautilus|Nautilus)$, no_blur on
windowrule = match:title ^(Files|Nautilus).*$, opacity 1
windowrule = match:title ^(Files|Nautilus).*$, no_blur on

# Fallback: some GNOME apps report different class names under Wayland
windowrule = match:class ^(org\.gnome\..*)$, opacity 1
windowrule = match:class ^(org\.gnome\..*)$, no_blur on

# Chromium/Brave: make floating popups and context menus square and shadowless
# so desktop bleed-through around native Wayland menus does not show through.
windowrule = match:class ^(brave-browser|google-chrome|chromium|chromium-browser)$, match:float 1, no_shadow on
windowrule = match:class ^(brave-browser|google-chrome|chromium|chromium-browser)$, match:float 1, rounding 0
