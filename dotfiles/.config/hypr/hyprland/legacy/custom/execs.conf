# You can make apps auto-start here
# Relevant Hyprland wiki section: https://wiki.hyprland.org/Configuring/Keywords/#executing

exec = sh -c "~/.config/hypr/custom/scripts/combine_audio.sh"
# Quickshell is started once from hyprland/execs.conf to avoid launch races.
exec-once = ~/.config/hypr/custom/scripts/focus_primary_monitor.sh
exec-once = ~/.config/hypr/custom/scripts/set_primary_xwayland_monitor.sh
