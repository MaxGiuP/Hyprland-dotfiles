# You can put extra environment variables here
# https://wiki.hyprland.org/Configuring/Environment-variables/

env = XCURSOR_THEME,WhiteSur-cursors
env = HYPRCURSOR_THEME,WhiteSur-cursors-hyprcursors
env = XCURSOR_SIZE,32
env = HYPRCURSOR_SIZE,32

# GTK_THEME and GTK_ICON_THEME are managed by applygtk.sh via gsettings/settings.ini
# Setting them here hard-codes a theme name that may not exist and overrides everything.
# env = GDK_BACKEND,wayland,x11     # prefer Wayland for GTK apps


# ####### Language ##########
# env = LANG=de_DE.UTF-8
# env = LC_TIME=de_DE.UTF-8
# env = LC_CTYPE=de_DE.UTF-8
# env = LC_ALL=de_DE.UTF-8
env = LANG=it_IT.UTF-8
env = LC_TIME=it_IT.UTF-8
env = LC_CTYPE=it_IT.UTF-8
env = LC_ALL=it_IT.UTF-8
