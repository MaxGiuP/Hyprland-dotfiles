# ############ Wayland #############
env = ELECTRON_OZONE_PLATFORM_HINT,auto

######### Applications #########
env = XDG_DATA_DIRS,/usr/local/share:/usr/share:/var/lib/flatpak/exports/share:$HOME/.local/share/flatpak/exports/share

# ############ Themes #############
env = QT_QPA_PLATFORM,wayland
env = QT_QPA_PLATFORMTHEME,qt6ct

# ######## Virtual envrionment #########
env = ILLOGICAL_IMPULSE_VIRTUAL_ENV, ~/.local/state/quickshell/.venv

# ######## Terminal application #########
env = TERMINAL,kitty -1
# GTK_THEME is intentionally unset — GTK3/4 apps use the theme from gsettings/settings.ini
# and the quickshell color pipeline writes to ~/.config/gtk-{3,4}.0/gtk.css to apply Material You colors
# env = GTK_USE_PORTAL,1

# ######## Cursor #########
env = XCURSOR_THEME,WhiteSur-cursors
env = HYPRCURSOR_THEME,WhiteSur-cursors-hyprcursors
env = XCURSOR_SIZE,32
env = HYPRCURSOR_SIZE,32

# GTK_THEME and GTK_ICON_THEME are managed by applygtk.sh via gsettings/settings.ini
# Setting them here hard-codes a theme name that may not exist and overrides everything.
# env = GDK_BACKEND,wayland,x11     # prefer Wayland for GTK apps

# ######## Language ##########
# env = LANG=de_DE.UTF-8
# env = LC_TIME=de_DE.UTF-8
# env = LC_CTYPE=de_DE.UTF-8
# env = LC_ALL=de_DE.UTF-8
env = LANG=it_IT.UTF-8
env = LC_TIME=it_IT.UTF-8
env = LC_CTYPE=it_IT.UTF-8
env = LC_ALL=it_IT.UTF-8
