# ############ Wayland #############
env = ELECTRON_OZONE_PLATFORM_HINT,auto

######### Applications #########
env = XDG_DATA_DIRS,/usr/local/share:/usr/share:/var/lib/flatpak/exports/share:$HOME/.local/share/flatpak/exports/share

# ############ Themes #############
env = QT_QPA_PLATFORM,wayland
env = QT_QPA_PLATFORMTHEME,qt6ct

# ######## Virtual envrionment #########
env = ILLOGICAL_IMPULSE_VIRTUAL_ENV, ~/.local/state/quickshell/.venv

# ######## Terminal application #########
env = TERMINAL,kitty -1
# GTK_THEME is intentionally unset — GTK3/4 apps use the theme from gsettings/settings.ini
# and the quickshell color pipeline writes to ~/.config/gtk-{3,4}.0/gtk.css to apply Material You colors
# env = GTK_USE_PORTAL,1
