$lock_cmd = ~/.config/hypr/hyprland/scripts/lock_with_quickshell.sh ii
# $lock_cmd = pidof hyprlock || hyprlock
$suspend_cmd = systemctl suspend || loginctl suspend

general {
    lock_cmd = $lock_cmd
    before_sleep_cmd = $lock_cmd
    after_sleep_cmd = ~/.config/hypr/hyprland/scripts/on-resume.sh
    inhibit_sleep = 3
}

# Display power handling.

listener {
    timeout = 600 # 10mins
    on-timeout = hyprctl dispatch dpms off
    on-resume = hyprctl dispatch dpms on
}

# Automatic idle lock is managed by Quickshell below.
# Automatic idle suspend is still disabled. Manual suspend still works, and
# before_sleep_cmd will lock first.

# >>> quickshell managed idle lock >>>
listener {
    timeout = 1200
    on-timeout = $lock_cmd
}
# <<< quickshell managed idle lock <<<
