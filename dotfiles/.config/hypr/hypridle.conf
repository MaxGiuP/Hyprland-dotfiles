$lock_cmd = ~/.config/hypr/hyprland/scripts/lock_with_quickshell.sh ii
# $lock_cmd = pidof hyprlock || hyprlock
$suspend_cmd = systemctl suspend || loginctl suspend

general {
    lock_cmd = $lock_cmd
    before_sleep_cmd = $lock_cmd
    after_sleep_cmd = ~/.config/hypr/hyprland/scripts/on-resume.sh
    inhibit_sleep = 3
}

# Automatic idle lock is disabled. Manual lock still works, and the session
# still locks before an explicit suspend.

listener {
    timeout = 600 # 10mins
    on-timeout = hyprctl dispatch dpms off
    on-resume = hyprctl dispatch dpms on
}

# Automatic idle suspend is disabled. Manual suspend still works, and
# before_sleep_cmd will lock first.
