source = ~/.config/hypr/hyprlock/colors.conf
source = $HOME/.cache/wal/colors-hyprland.conf

background {

    path = screenshot   # only png supported for now
    color = $color1

    # all these options are taken from hyprland, see https://wiki.hyprland.org/Configuring/Variables/#blur for explanations
    blur_size = 4
    blur_passes = 3 # 0 disables blurring
    noise = 0.0117
    contrast = 1.5000 # Vibrant!!!
    brightness = 0.900
    vibrancy = 0.2100
    vibrancy_darkness = 0.0
}

# Lock
label {

    text = <b><big> 🔒︎ </big></b>
    color = $color6
    font_size = 35
    font_family = $font_family
    shadow_passes = 3
    shadow_size = 4

    position = 0, 350
    halign = center
    valign = center
}

# Time
label {

    text = cmd[update:2000] echo "<b><big> $(date +"%H") : $(date +"%M") </big></b>"
    color = $color6
    font_size = 175
    font_family = $font_family_clock
    shadow_passes = 3
    shadow_size = 4

    position = 0, 220
    halign = center
    valign = center
}

# Today
label {

    text = cmd[update:18000] echo "<b><big> "$(date +'%A')" "$(date +'%d %b')" </big></b>" & "\n" & ${XDG_CONFIG_HOME:-$HOME/.config}/hypr/hyprlock/lock-weather-emoji.sh "London"
    color = $color7
    font_size = 25
    font_family = $font_family

    position = -200,40
    halign = center
    valign = center
}

