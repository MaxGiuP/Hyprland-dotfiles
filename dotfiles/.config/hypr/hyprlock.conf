# Bottom-left media PROGRESS (50 from left, 50 from bottom)
label {

    text = cmd[update:1000] ${XDG_CONFIG_HOME:-$HOME/.config}/hypr/hyprlock/lock-media-progress.sh
    color = $color7            # pick one of your pywal colors; $color6 also looks good
    font_size = 18
    font_family = $font_family
    position = 210, 45
    halign = center
    valign = center
}

# Bottom-left PAUSE/PLAY button (clickable), just above the bar
label {

    text = cmd[update:1000] ${XDG_CONFIG_HOME:-$HOME/.config}/hypr/hyprlock/lock-media-icon.sh
    color = $color6
    font_size = 30
    font_family = JetBrainsMono Nerd Font 10
    position = 220, 5          # 30 px above the progress label
    halign = center
    valign = center
    onclick = playerctl play-pause
}

# Prev
label {

    text = ⏮
    color = $color6
    font_size = 30
    font_family = JetBrainsMono Nerd Font 10
    position = 120, 5
    halign = center
    valign = center
    onclick = playerctl previous
}
# Next
label {

    text = ⏭
    color = $color6
    font_size = 30
    font_family = JetBrainsMono Nerd Font 10
    position = 320, 5
    halign = center
    valign = center
    onclick = playerctl next
}

# Bottom-left NOW PLAYING (sopra al bottone)
label {

    text = cmd[update:2000] ${XDG_CONFIG_HOME:-$HOME/.config}/hypr/hyprlock/lock-nowplaying.sh 30
    color = $color7
    font_size = 14
    font_family = $font_family
    position = 215, 75
    halign = center
    valign = center
}

# Reboot
label {

    text =  󰜉 
    color = $outer_color
    font_size = 35
    onclick = reboot
    position = 160, 30
    halign = left
    valign = bottom
}

# Power off
label {

    text =  󰐥 
    color = $outer_color
    font_size = 35
    onclick = shutdown now
    position = 90, 30
    halign = left
    valign = bottom
}

# Suspend
label {

    text =  󰤄 
    color = $outer_color
    font_size = 35
    onclick = systemctl suspend
    position = 20, 30
    halign = left
    valign = bottom
}

# Logout
label {

    text =  󰍃             # nf-md-logout
    color = $outer_color
    font_size = 35
    onclick = hyprctl dispatch exit
    position = 230, 30
    halign = left
    valign = bottom
}

input-field {

    size = 250, 50
    outline_thickness = 3

    dots_size = 0.26 # Scale of input-field height, 0.2 - 0.8
    dots_spacing = 0.64 # Scale of dots' absolute size, 0.0 - 1.0
    dots_center = true
    dots_rouding = -1

    rounding = 22
    outer_color = $color0
    inner_color = $color0
    font_color = $color6
    fade_on_empty = true
    placeholder_text = <i>Password...</i> # Text rendered in the input box when it's empty.
    font_family = $font_family

    position = 0, -100
    halign = center
    valign = center
}
